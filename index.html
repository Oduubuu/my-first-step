<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
            margin: 0;
            font-family: 'Apple SD Gothic Neo', sans-serif;
            text-align: center;
            background: #f9f9f9;
        }

        /* 배너스타일 */
        #doyoon-banner {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            background: linear-gradient(to right, #4CAF50, #81C784);
            color: white;
            padding: 12px 0;
            font-weight: bold;
            z-index: 9999;
        }

        /* 중앙 버튼 스타일 */
        .container {
            margin-top: 150px;
        }
        #celebrate-btn {
            padding: 15px 30px;
            font-size: 1.2rem;
            border: none;
            border-radius: 50px;
            background: #FF5252;
            color: white;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            transition: transform 0.2s;
        }
        #celebrate-btn:active {
            transform: scale(0.95);
        }
    </style>
    
</head>
<body>
    
    <div id="doyoon-banner">
        <span>
            4월도 엄마 파이팅! - 도윤👶🏻 -
        </span>
        <button id="close-btn">
            닫기
        </button>
    </div>

    <div class="container">
        <h1>4월 1일, 첫 잔디 완료!</h1>
        <p>아래 버튼을 눌러 자축해 보세요.</p>
        <button id="celebrate-btn">
            🎉 축하 폭죽 터트리기
        </button>
    </div>

    <script>
        const bannerBtn = document.querySelector('#close-btn');
        const btn = document.querySelector('#celebrate-btn');

        bannerBtn.addEventListener('click', function(){
            document.getElementById('doyoon-banner').style.display = 'none';
        });

        btn.addEventListener('click', function(){
            alert("팡팡! 🎆 4월의 첫 잔디 성공을 축하합니다, 오두부님!");

            console.log("도윤이도 기뻐하고 있어요!");
        });

        
    </script>
</body>
</html>
