<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        /* 1. 기본 배경 및 부드러운 전환 효과 */
        body {
            margin: 0;
            padding: 20px;
            font-family: sans-serif;
            background-color: white;
            color: black;
            transition: background-color 0.4s, color 0.4s;
        }

        /* 2. 다크모드 스타일 (.dark 클래스가 붙을 때) */
        body.dark {
            background-color: #222;
            color: white;
        }

        /* 3. 프로필 카드 디자인 */
        .profile-card {
            width: 280px;
            margin: 30px auto;
            padding: 25px;
            border: 1px solid #eee;
            border-radius: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            text-align: center;
            background-color: white;
            color: black;
        }
        body.dark .profile-card {
            background: #333;
            color: white;
            border-color: #444;
        }
        .profile-img {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            border: 3px solid #4CAF50;
            margin-bottom: 15px;
        }

        /* 4. 버튼 공통 스타일 */
        .btn {
            padding: 8px 16px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-weight: bold;
        }
        #theme-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: #eee;
        }
        body.dark #theme-btn {
            background-color: #444;
            color: white;
        }
    </style>
</head>
<body>
    <button id="theme-btn" class="btn">다크모드</button>

    <div class="profile-card">
        <img src="https://via.placeholder.com/100" alt="프로필" class="profile-img">
        <h2>오두부</h2>
        <p style="color: #888;">
                초보 퍼블리셔 / 잔디 관리자
        </p>
        <div class="" style="margin-top: 15px;">
            <button class="btn" style="background: #4CAF50; color: white;">
                GitHub
            </button>
            <button class="btn" style="background: #eee;">
                Blog
            </button>
        </div>
    </div>

    <script>
        const themeBtn = document.querySelector('#theme-btn');

        // 다크모드 토글 기능
        themeBtn.addEventListener('click', () => {
            document.body.classList.toggle('dark');

            // 버튼 텍스트 변경
            if (document.body.classList.contains('dark')) {
                themeBtn.textContent = '라이트모드';
            } else {
                themeBtn.textContent = '다크모드';
            }
            
        });

    </script>
</body>
</html>
