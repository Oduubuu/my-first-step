<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        .menu-container {
            margin: 50px;
            text-align: center;
            font-family: sans-serif;
        }

        /* 버튼스타일 */
        #menu-btn {
            padding: 10px 20px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
        }

        /* 드롭다운 내용 (오늘의 핵심!) */
        .content {
            /* 처음엔 높이를 0으로 */
            max-height: 0;
            /* 넘치는 내용은 숨기기 */
            overflow: hidden;
            /* 0.5초 동안 부드럽게 변신 */
            transition: max-height 0.5s ease;
            background-color: #f1f1f1;
            margin-top: 10px;
            border-radius: 5px;
        }

        /* 버튼을 누르면 이 클래스가 붙어서 스르륵 내려와요 */
        .content.show {
            /* 내용이 보일 만큼 늘리기 */
            max-height: 200px;
        }

        .inner-text {
            padding: 20px;
        }
    </style>
</head>
<body>
    <div class="menu-container">
        <button id="menu-btn">
            오두부의 드롭다운 (클릭!)
        </button>
        <div id="dropdown-content" class="content">
            <div class="inner-text">
                <p>🌱 오늘의 잔디 심기 성공!</p>
                <p>CSS transition으로 부드러워졌어요.</p>
            </div>
        </div>
    </div>

    <script>
        const btn = document.querySelector('#menu-btn');
        const content = document.querySelector('#dropdown-content');

        btn.addEventListener('click' , () => {
            content.classList.toggle('show');
        });
    </script>
</body>
</html>
