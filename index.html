<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        body {
            margin: 0;
            font-family: 'Apple SD Gothic Neo', sans-serif;
            text-align: center;
            background: #f9f9f9;
        }

        /* 배너스타일 */
        #doyoon-banner {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            background: linear-gradient(to right, #4CAF50, #81C784);
            color: white;
            padding: 12px 0;
            font-weight: bold;
            z-index: 9999;
        }

        .container {
            margin-top: 150px;
        }

        /* 중앙 버튼 스타일 */
        #celebrate-btn {
            padding: 15px 30px;
            font-size: 1.2rem;
            border: none;
            border-radius: 50px;
            background: #FF5252;
            color: white;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }
    </style>

</head>

<body>

    <div id="doyoon-banner">
        <span>
            4월도 엄마 파이팅! - 도윤👶🏻 -
        </span>
        <button id="close-btn">
            닫기
        </button>
    </div>

    <div class="container">
        <button id="celebrate-btn">
            🎉 축하 폭죽 터트리기
        </button>
    </div>

    <script>
        const photos = [
            "doyoon1.jpg",
            "doyoon2.jpg",
            "doyoon3.jpg"
        ];

        const mainPhoto = document.querySelector('#doyoon-photo');
        const photoBtn = document.querySelector('#photo-change-btn');

        photoBtn.addEventListener('click', function(){
            const randomIndex = Math.floor(Math.random() * photos.length);

            mainPhoto.src = photos[randomIndex];

            console.log("사진이 바꼈어요!");
        });
    </script>
</body>

</html>
