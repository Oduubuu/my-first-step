<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
            width: 100vw;
            height: 100vh;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        #banner {
            width: 100%;
            height: 50px;
            top: 0;
            left: 0;
            position: fixed;
            background-color: blueviolet;
            color: white;
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        button {
            cursor: pointer;
        }

        #close-btn {
            margin: 10px;
        }

        .container {
            display: flex;
            flex-direction: column;
        }
    </style>
</head>

<body>
    <div id="banner">
        <span>상단배너입니다</span>
        <button id="close-btn">닫기</button>
    </div>

    <div class="container">
        <button id="celebrate-btn">
            버튼을 눌러보세요!
        </button>
    </div>

    <script>
        const btn = document.querySelector('#close-btn');
        const btn2 = document.querySelector('#celebrate-btn');

        btn.addEventListener('click', function(){
            document.querySelector('#banner').style.display = 'none';
        });
        btn2.addEventListener('click', function(){
            alert('여보 사랑해');
            
            console.log('되나안되나확인중');
        });
    </script>
</body>

</html>
