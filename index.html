<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        .menu-container {
            margin: 50px;
            text-align: center;
            font-family: sans-serif;
        }

        /* 버튼스타일 */
        #menu-btn {
            padding: 10px 20px;
            background-color: #3289d0;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
        }

        /* 드롭다운 내용 (오늘의 핵심!) */
        .content {
            /* 처음엔 높이를 0으로 */
            max-height: 0;
            /* 넘치는 내용은 숨기기 */
            overflow: hidden;
            /* 0.5초 동안 부드럽게 변신 */
            transition: max-height 0.5s ease;
            background-color: #f1f1f1;
            margin-top: 10px;
            border-radius: 5px;
        }

        /* 버튼을 누르면 이 클래스가 붙어서 스르륵 내려와요 */
        .content.show {
            /* 내용이 보일 만큼 늘리기 */
            max-height: 200px;
        }

        .inner-text {
            padding: 20px;
        }
    </style>
</head>
<body>
    <div class="menu-container">
        <button id="menu-btn">
            오늘도 화이팅! (클릭!)
        </button>
        <div id="dropdown-content" class="content">
            <div class="inner-text">
                <p>🌱 오늘의 잔디 심기 성공!</p>
                <p>CSS transition으로 부드러워졌어요.</p>
            </div>
        </div>

        <button id="modal-open-btn" style="margin-top: 20px; padding: 10px; background: #2196f3; color: white; border: none; border-radius: 5px; cursor: pointer;">
            공지사항 열기
        </button>
        <div id="modal-bg" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 100;">
            <div style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; padding: 30px; border-radius: 10px; text-align: center;">
                <h2>오늘의 공지</h2>
                <p>오두부님, 오늘 벌써 코드 두 개째네요! 대단해요!</p>
                <button id="moda-close-btn" style="padding: 5px 15px; cursor: pointer;">
                    닫기
                </button>
            </div>
        </div>
    </div>

    <script>
        const btn = document.querySelector('#menu-btn');
        const content = document.querySelector('#dropdown-content');

        btn.addEventListener('click' , () => {
            content.classList.toggle('show');
        });

        //모달 관련 요소 찾기
        const openBtn = document.querySelector('#modal-open-btn');
        const closeBtn = document.querySelector('#modal-close-btn');
        const modalBg = document.querySelector('#modal-bg');

        // 1. 열기 버튼 누르면 보이기
        openBtn.addEventListener('click', () => {
            modalBg.style.display = 'block';
        });

        // 2. 닫기 버튼 누르면 숨기기
        closeBtn.addEventListener('click', () => {
            modalBg.style.display = 'none';
        });
    </script>
</body>
</html>
